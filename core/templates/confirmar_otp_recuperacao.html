<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar OTP | EdusCel</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet">


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
rel="stylesheet">


<style>

body {

    background:
    linear-gradient(135deg, #020617, #0f172a, #1e3a8a);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:"Inter", system-ui, sans-serif;

}



.card-recovery {

    width:420px;

    padding:35px;

    border-radius:22px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 25px 60px rgba(0,0,0,.45);

}



.logo {

    width:70px;

    height:70px;

    border-radius:50%;

    background:
    linear-gradient(135deg,#2563eb,#16a34a);

    display:flex;

    align-items:center;

    justify-content:center;

    margin:auto;

    color:white;

    font-size:32px;

}



h4 {

    color:white;

    font-weight:700;

}



.subtitle {

    color:#cbd5e1;

    font-size:14px;

    line-height:1.5;

}



.form-label {

    color:#e2e8f0;

    font-weight:600;

}



.form-control {

    background:rgba(255,255,255,.10);

    border:none;

    color:white;

    padding:13px;

    border-radius:12px;

}



.form-control::placeholder {

    color:#cbd5e1;

}



.form-control:focus {

    background:rgba(255,255,255,.15);

    color:white;

    box-shadow:0 0 0 2px rgba(37,99,235,.4);

}



.otp-input {

    text-align:center;

    font-size:22px;

    font-weight:700;

    letter-spacing:8px;

}



.btn-primary {

    background:
    linear-gradient(135deg,#2563eb,#1d4ed8);

    border:none;

    padding:13px;

    border-radius:12px;

    font-weight:700;

    transition:.3s;

}



.btn-primary:hover {

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(37,99,235,.45);

}



.link {

    color:#93c5fd;

    text-decoration:none;

}



.link:hover {

    color:white;

}



.alert {

    border-radius:12px;

    font-size:14px;

}


</style>

</head>



<body>



<div class="card-recovery">



<div class="text-center mb-4">


<div class="logo">

<i class="bi bi-shield-check"></i>

</div>



<h4 class="mt-3">

Confirmar Código OTP

</h4>



<p class="subtitle">

Digite o código enviado para o seu telefone
e defina uma nova senha de acesso.

</p>


</div>




{% if messages %}

{% for message in messages %}

<div class="alert alert-{{ message.tags }}">

{{ message }}

</div>

{% endfor %}

{% endif %}




<form method="POST">


{% csrf_token %}



<div class="mb-3">


<label class="form-label">

Nome de Utilizador

</label>


<input 
type="text"
name="username"
class="form-control"
placeholder="Digite o seu username"
required



</div>




<div class="mb-3">


<label class="form-label">

Código OTP

</label>


<input 
type="text"
name="otp_codigo"
class="form-control otp-input"
placeholder="000000"
maxlength="6"
autocomplete="one-time-code"
required



<small class="text-light opacity-75">

O código expira após 5 minutos.

</small>


</div>




<div class="mb-3">


<label class="form-label">

Nova Senha

</label>



<input 
type="password"
name="nova_senha"
class="form-control"
placeholder="Digite a nova senha"
required




</div>





<div class="mb-4">


<label class="form-label">

Confirmar Nova Senha

</label>



<input 
type="password"
name="confirmar_senha"
class="form-control"
placeholder="Repita a nova senha"
required




</div>





<button 
type="submit"
class="btn btn-primary w-100">


<i class="bi bi-check-circle me-2"></i>

Alterar Senha


</button>




</form>





<div class="text-center mt-4">


<a 
href="{% url 'esqueci_senha' %}"
class="link">


<i class="bi bi-arrow-left me-1"></i>

Solicitar novo código


</a>


</div>



</div>




</body>

</html>
