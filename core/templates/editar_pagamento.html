{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4">Editar Pagamento</h2>

    <form method="POST" action="{% url 'editar_pagamento' pagamento.id %}">
        {% csrf_token %}

        <div class="row">

            <!-- MÊS -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Mês de Referência</label>
                <input type="text"
                       name="mes_referencia"
                       class="form-control"
                       value="{{ pagamento.mes_referencia }}">
            </div>

            <!-- VALOR -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Valor</label>
                <input type="number"
                       step="0.01"
                       name="valor"
                       class="form-control"
                       value="{{ pagamento.valor }}">
            </div>

            <!-- DATA VENCIMENTO -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Data de Vencimento</label>
                <input type="date"
                       name="data_vencimento"
                       class="form-control"
                       value="{{ pagamento.data_vencimento|date:'Y-m-d' }}">
            </div>

            <!-- DATA PAGAMENTO -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Data de Pagamento</label>
                <input type="date"
                       name="data_pagamento"
                       class="form-control"
                       value="{{ pagamento.data_pagamento|date:'Y-m-d' }}">
            </div>

            <!-- STATUS -->
            <div class="col-md-12 mb-3">
                <label class="form-label">Status</label>

                <select name="status" class="form-control">

                    <option value="PAGO"
                        {% if pagamento.status == "PAGO" %}selected{% endif %}>
                        Pago
                    </option>

                    <option value="PENDENTE"
                        {% if pagamento.status == "PENDENTE" %}selected{% endif %}>
                        Pendente
                    </option>

                    <option value="ATRASADO"
                        {% if pagamento.status == "ATRASADO" %}selected{% endif %}>
                        Atrasado
                    </option>

                </select>
            </div>

        </div>

        <!-- BOTÕES -->
        <div class="mt-3">

            <button type="submit" class="btn btn-primary">
                Guardar Alterações
            </button>

            <a href="{% url 'gerenciar_pagamentos' %}" class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>
{% endblock %}
