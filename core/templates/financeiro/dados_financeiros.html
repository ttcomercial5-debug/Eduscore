{% extends "base_financeiro.html" %}


{% block content %}



<div class="container-fluid">


<!-- =====================================================
     HERO
===================================================== -->

<div class="receipt-hero">

    <div class="hero-content">

        <div>

            <h1>

                <i class="bi bi-bank me-2"></i>

                DADOS FINANCEIROS

            </h1>


        </div>



    </div>

</div>



<form method="POST">

{% csrf_token %}






<!-- ESCOLA -->


<div class="finance-card">


<h5 class="fw-bold mb-4">

<i class="bi bi-building me-2"></i>

Identificação da Escola

</h5>



<div class="row g-4">



<div class="col-md-6">

<label class="form-label">

Nome da Escola

</label>


<input

class="form-control"

value="{{ escola.nome }}"

readonly>


</div>





<div class="col-md-6">

<label class="form-label">

NIF

</label>


<input

class="form-control"

value="{{ escola.nif|default:'' }}"

readonly>


</div>





<div class="col-md-6">

<label class="form-label">

Telefone

</label>


<input

class="form-control"

value="{{ escola.telefone }}"

readonly>


</div>





<div class="col-md-6">

<label class="form-label">

Email

</label>


<input

class="form-control"

value="{{ escola.email }}"

readonly>


</div>



</div>


</div>









<!-- MOEDA -->


<div class="finance-card">


<h5 class="fw-bold mb-4">

<i class="bi bi-cash-stack me-2"></i>

Configuração Monetária

</h5>




<div class="row g-4">


<div class="col-md-6">


<label class="form-label">

Moeda

</label>


<select

name="moeda"

class="form-select">


<option value="Kz">

Kwanza (Kz)

</option>


<option value="USD">

Dólar (USD)

</option>


</select>


</div>



<div class="col-md-6">


<label class="form-label">

Formato

</label>


<input

name="formato_valor"

class="form-control"

value="{{config.formato_valor}}">


</div>



</div>


</div>









<!-- RECIBOS -->


<div class="finance-card">


<h5 class="fw-bold mb-4">

<i class="bi bi-receipt me-2"></i>

Recibos Financeiros

</h5>




<div class="row g-4">



<div class="col-md-4">

<label class="form-label">

Nome

</label>


<input

name="nome_recibo"

class="form-control"

value="{{config.nome_recibo}}">


</div>



<div class="col-md-4">

<label class="form-label">

Prefixo

</label>


<input

name="prefixo_recibo"

class="form-control"

value="{{config.prefixo_recibo}}">


</div>



<div class="col-md-4">

<label class="form-label">

Número inicial

</label>


<input

name="numero_inicial_recibo"

class="form-control"

value="{{config.numero_inicial_recibo}}">


</div>



</div>





<hr>



<div class="form-check form-switch">

<input

class="form-check-input"

type="checkbox"

name="mostrar_logo_recibo"

{% if config.mostrar_logo_recibo %}

checked

{% endif %}

>


<label>

Mostrar logotipo

</label>


</div>




<div class="form-check form-switch">

<input

class="form-check-input"

type="checkbox"

name="mostrar_assinatura"

{% if config.mostrar_assinatura %}

checked

{% endif %}

>


<label>

Mostrar assinatura

</label>


</div>




<div class="form-check form-switch">

<input

class="form-check-input"

type="checkbox"

name="mostrar_carimbo"

{% if config.mostrar_carimbo %}

checked

{% endif %}

>


<label>

Mostrar carimbo

</label>


</div>



</div>








<!-- RESPONSÁVEL -->


<div class="finance-card">


<h5 class="fw-bold mb-4">

<i class="bi bi-person-badge me-2"></i>

Responsável Financeiro

</h5>



<div class="row g-4">


<div class="col-md-4">

<input

class="form-control"

name="responsavel_financeiro"

placeholder="Nome">

</div>



<div class="col-md-4">

<input

class="form-control"

name="telefone_responsavel"

placeholder="Telefone">

</div>



<div class="col-md-4">

<input

class="form-control"

name="email_responsavel"

placeholder="Email">

</div>


</div>


</div>







<div class="text-end mb-5">


<button class="btn btn-eduscel btn-lg">

<i class="bi bi-check-circle me-2"></i>

Guardar Dados Financeiros

</button>


</div>





</form>


</div>


<style>
/* =====================================================
   HERO PREMIUM
===================================================== */

.receipt-hero{

    background:
    linear-gradient(
        135deg,
        #020617,
        #2563eb
    );

    border-radius:30px;

    padding:45px;

    color:#fff;

    margin-bottom:35px;

    box-shadow:
    0 25px 60px rgba(15,23,42,.25);

}

.hero-content{

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;

}

.receipt-hero h1{

    font-size:34px;
    font-weight:900;
    margin-bottom:10px;

}

.receipt-hero p{

    margin:0;
    color:#cbd5e1;
    max-width:700px;

}

.hero-btn{

    background:#fff;

    color:#2563eb;

    border:none;

    border-radius:16px;

    padding:14px 28px;

    font-weight:800;

    transition:.25s;

}

.hero-btn:hover{

    background:#f8fafc;

    color:#1d4ed8;

    transform:translateY(-2px);

}

@media(max-width:768px){

    .receipt-hero{

        padding:30px;

    }

    .receipt-hero h1{

        font-size:28px;

    }

}
</style>

{% endblock %}
