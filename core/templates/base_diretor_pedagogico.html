<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>EdusCel - Diretor Pedagógico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            background: #f4f7fb;
        }

        /* ================= SIDEBAR ================= */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a, #1e3a8a);
            color: #fff;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 24px;
            font-size: 22px;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }

        .logo small {
            display: block;
            font-size: 12px;
            opacity: .7;
            margin-top: 4px;
        }

        /* ================= MENU ================= */

        .menu {
            flex: 1;
        }

        .menu-btn {
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: .2s;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,.08);
        }

        .submenu a {
            display: block;
            padding: 10px 35px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
            transition: .2s;
        }

        .submenu a:hover {
            background: rgba(255,255,255,.06);
            color: #fff;
        }

        /* ================= LOGOUT FIXO ================= */

        .logout-box {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,.1);
        }

        .logout-box a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fca5a5;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 14px;
            border-radius: 10px;
            transition: .2s;
        }

        .logout-box a:hover {
            background: rgba(255,255,255,.08);
            color: #fff;
        }

        /* ================= MAIN ================= */

        .main {
            margin-left: 280px;
            padding: 30px;
        }

        .topbar {
            background: #fff;
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,.05);
        }

        .badge-role {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
        }

        @media (max-width: 992px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main {
                margin-left: 0;
            }
        }

    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <div class="logo">
        EdusCel
        <small>Diretor Pedagógico</small>
    </div>

    <!-- ================= MENU ================= -->
    <div class="menu">

        <!-- PAINEL -->
        <button class="menu-btn" data-bs-toggle="collapse" data-bs-target="#painel">
            <span><i class="bi bi-speedometer2"></i> Painel</span>
            <i class="bi bi-chevron-down"></i>
        </button>

        <div class="collapse submenu" id="painel">
            <a href="{% url 'dashboard_diretor_pedagogico' %}">Resumo</a>
        </div>

        <!-- ACADÉMICO -->
        <button class="menu-btn" data-bs-toggle="collapse" data-bs-target="#academico">
            <span><i class="bi bi-book"></i> Académico</span>
            <i class="bi bi-chevron-down"></i>
        </button>

        <div class="collapse submenu" id="academico">
            <a href="{% url 'alunos' %}">Alunos</a>
            <a href="{% url 'professores' %}">Professores</a>
            <a href="{% url 'turmas' %}">Turmas</a>
            <a href="{% url 'disciplinas' %}">Disciplinas</a>
            <a href="{% url 'cursos' %}">Cursos</a>
            <a href="{% url 'painel_diretor_frequencia' %}">Frequências</a>
            <a href="{% url 'pauta_final_ano' %}">Pautas</a>
        </div>

        <!-- SISTEMA -->
        <button class="menu-btn" data-bs-toggle="collapse" data-bs-target="#sistema">
            <span><i class="bi bi-gear"></i> Sistema</span>
            <i class="bi bi-chevron-down"></i>
        </button>

        <div class="collapse submenu" id="sistema">
            <a href="{% url 'horarios_turma' %}">Horários</a>
            <a href="{% url 'calendario_escolar' %}">Calendário</a>
            <a href="{% url 'notificacoes' %}">Notificações</a>
        </div>

    </div>

    <!-- ================= LOGOUT FORA DOS MENUS ================= -->
    <div class="logout-box">
        <a href="{% url 'logout' %}">
            <i class="bi bi-box-arrow-right"></i>
            Sair
        </a>
    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

    <div class="topbar">

        <div>
            <h4 class="mb-0">
                Bem-vindo, {{ request.user.first_name|default:request.user.username }}
            </h4>
            <small>Painel de Gestão Pedagógica</small>

        </div>

        <span class="badge-role">
            Diretor Pedagógico
        </span>


    </div>

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const socket = new WebSocket("ws://" + window.location.host + "/ws/notificacoes/");

socket.onmessage = function(event){
    const data = JSON.parse(event.data);

    // badge do sino
    let badge = document.querySelector(".notif-badge");

    if(badge){
        badge.innerText = parseInt(badge.innerText || 0) + 1;
    }

    // toast simples
    showToast(data.titulo, data.mensagem);
};

function showToast(title, message){

    const toast = document.createElement("div");

    toast.innerHTML = `
        <div style="
            position:fixed;
            top:20px;
            right:20px;
            background:#111827;
            color:white;
            padding:12px 16px;
            border-radius:10px;
            z-index:9999;
            margin-top:10px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        ">
            <strong>${title}</strong><br>
            <small>${message}</small>
        </div>
    `;

    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 5000);
}
</script>

</body>
</html>
