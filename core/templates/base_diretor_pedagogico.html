<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>EdusCel - Diretor Pedagógico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            background: #f4f7fb;
        }

        /* ================= SIDEBAR ================= */

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 270px;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a, #1e3a8a);
            color: #fff;
            overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,.12);
        }

        .logo {
            padding: 28px 24px;
            font-size: 24px;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }

        .logo small {
            display: block;
            font-size: 12px;
            opacity: .8;
            margin-top: 4px;
        }

        .menu {
            padding: 18px;
        }

        .menu-title {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            margin: 18px 10px 8px;
            letter-spacing: 1px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #e2e8f0;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: .25s;
            font-weight: 600;
        }

        .menu a:hover {
            background: rgba(255,255,255,.08);
            transform: translateX(3px);
        }

        .menu a.active {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: #fff;
        }

        /* ================= MAIN ================= */

        .main {
            margin-left: 270px;
            padding: 30px;
        }

        .topbar {
            background: #fff;
            border-radius: 18px;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,.05);
        }

        .user-box h4 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .user-box small {
            color: #64748b;
        }

        .badge-role {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
        }

        /* ================= RESPONSIVO ================= */

        @media (max-width: 992px) {

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main {
                margin-left: 0;
            }

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        EdusCel
        <small>Diretor Pedagógico</small>
    </div>

    <div class="menu">

        <div class="menu-title">Principal</div>

        <a href="{% url 'dashboard_diretor_pedagogico' %}">
            <i class="bi bi-speedometer2"></i>
            Resumo
        </a>

        <div class="menu-title">Gestão Académica</div>

        <a href="{% url 'alunos' %}">
            <i class="bi bi-people"></i>
            Alunos
        </a>

        <a href="{% url 'painel_diretor_frequencia' %}">
            <i class="bi bi-check2-square"></i>
            Frequências
        </a>

        <a href="{% url 'professores' %}">
            <i class="bi bi-person-badge"></i>
            Professores
        </a>

        <a href="{% url 'turmas' %}">
            <i class="bi bi-easel"></i>
            Turmas
        </a>

        <a href="{% url 'disciplinas' %}">
            <i class="bi bi-book"></i>
            Disciplinas
        </a>

        <a href="{% url 'cursos' %}">
            <i class="bi bi-mortarboard"></i>
            Cursos
        </a>

        <a href="{% url 'horarios_turma' %}">
            <i class="bi bi-calendar3"></i>
            Horários
        </a>

        <a href="{% url 'calendario_escolar' %}">
            <i class="bi bi-calendar-event"></i>
            Calendário
        </a>

        <hr class="text-secondary">

        <a href="{% url 'logout' %}">
            <i class="bi bi-box-arrow-right"></i>
            Sair
        </a>

    </div>

</div>

<div class="main">

    <div class="topbar">

        <div class="user-box">

            <h4>
                Bem-vindo, {{ request.user.first_name|default:request.user.username }}
            </h4>

            <small>
                Painel de Gestão Pedagógica
            </small>

        </div>

        <span class="badge-role">
            Diretor Pedagógico
        </span>

    </div>

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let timer;
let warningTimer;

function resetTimer() {
    clearTimeout(timer);
    clearTimeout(warningTimer);

    // aviso antes de sair (opcional: 10 segundos antes)
    warningTimer = setTimeout(() => {
        console.log("Sessão vai expirar em 10 segundos por inatividade.");
    }, 290000); // 4min50s

    // logout após 5 minutos
    timer = setTimeout(() => {
        window.location.href = "{% url 'logout' %}";
    }, 300000); // 5 minutos
}

// eventos de atividade
document.addEventListener("mousemove", resetTimer);
document.addEventListener("keypress", resetTimer);
document.addEventListener("click", resetTimer);
document.addEventListener("scroll", resetTimer);

// inicia timer
resetTimer();
</script>
</body>
</html>
