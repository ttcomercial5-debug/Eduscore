<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • Sistema de Gestão Escolar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* ==========================================
   FUNDO
========================================== */

body{
margin:0;
padding:20px;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui,-apple-system,sans-serif;
overflow:auto;
}

/* ==========================================
   CARD
========================================== */

.login-card{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:35px;
box-shadow:0 25px 60px rgba(0,0,0,.45);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ==========================================
   LOGO
========================================== */

.logo-icon{
font-size:52px;
color:#60a5fa;
text-align:center;
margin-bottom:10px;
}

.logo-title{
font-size:24px;
font-weight:700;
color:white;
text-align:center;
}

.logo-sub{
font-size:13px;
color:#cbd5e1;
text-align:center;
margin-bottom:8px;
}

.ano-letivo{
text-align:center;
font-size:12px;
color:#93c5fd;
margin-bottom:25px;
}

/* ==========================================
   INPUTS
========================================== */

.form-label{
font-size:13px;
color:#e2e8f0;
}

.form-control{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
color:white;
padding:12px;
}

.form-control::placeholder{
color:#94a3b8;
}

.form-control:focus{
background:rgba(255,255,255,.12);
border-color:#3b82f6;
box-shadow:none;
color:white;
}

/* ==========================================
   SENHA
========================================== */

.password-wrapper{
position:relative;
}

.password-toggle{
position:absolute;
top:50%;
right:15px;
transform:translateY(-50%);
cursor:pointer;
color:#cbd5e1;
font-size:18px;
}

/* ==========================================
   BOTÃO
========================================== */

.btn-login{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border:none;
padding:12px;
font-weight:600;
transition:.3s;
}

.btn-login:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(37,99,235,.4);
}

/* ==========================================
   LINK
========================================== */

.forgot-link{
font-size:13px;
color:#93c5fd;
text-decoration:none;
}

.forgot-link:hover{
color:white;
}

/* ==========================================
   FOOTER
========================================== */

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.alert{
font-size:14px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo-icon">
<i class="bi bi-mortarboard-fill"></i>
</div>

<div class="logo-title">
EdusCel
</div>

<div class="logo-sub">
Sistema de Gestão de Escolas
</div>

<div class="ano-letivo">
Ano Letivo 2026/2027
</div>

{% if error %}
<div class="alert alert-danger">
<i class="bi bi-exclamation-triangle-fill"></i>
{{ error }}
</div>
{% endif %}

<form method="POST" id="loginForm">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Código da Escola
</label>

<input
type="text"
name="codigo_escola"
class="form-control"
placeholder="Ex: 1024"
value="{{ request.POST.codigo_escola }}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Usuário
</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Digite seu usuário"
value="{{ request.POST.username }}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Senha
</label>

<div class="password-wrapper">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Digite sua senha"
required>

<span class="password-toggle" onclick="togglePassword()">
<i class="bi bi-eye" id="eyeIcon"></i>
</span>

</div>

</div>

<button
type="submit"
id="loginButton"
class="btn btn-login w-100 text-white mb-3">

<i class="bi bi-box-arrow-in-right me-1"></i>
Entrar no EdusCel

</button>

<div class="text-center">

<a href="{% url 'esqueci_senha' %}" class="forgot-link">

<i class="bi bi-key"></i>
Esqueci minha senha

</a>

</div>

</form>

<div class="footer">
ICA Systems • Gestão de Escolas EdusCel
<br>
© 2026 Todos os direitos reservados
</div>

</div>

<script>

function togglePassword(){

const password =
document.getElementById("password");

const eye =
document.getElementById("eyeIcon");

if(password.type === "password"){

password.type = "text";

eye.classList.remove("bi-eye");
eye.classList.add("bi-eye-slash");

}else{

password.type = "password";

eye.classList.remove("bi-eye-slash");
eye.classList.add("bi-eye");

}

}

document.getElementById("loginForm").addEventListener("submit",function(){

const btn =
document.getElementById("loginButton");

btn.disabled = true;

btn.innerHTML =
'<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

});

</script>

</body>
</html>
