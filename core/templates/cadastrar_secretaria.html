{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:520px; margin-top:50px;">

<!-- 🔹 Cabeçalho -->
<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="fw-bold">
Cadastrar Funcionário Administrativo
</h4>

<a href="{% url 'lista_secretarias' %}" class="btn btn-outline-primary">
<i class="bi bi-people-fill"></i>
Ver Funcionários
</a>

</div>

<!-- Mensagens -->

{% if messages %}

{% for message in messages %}

<div class="alert alert-success alert-dismissible fade show">

<i class="bi bi-check-circle-fill"></i>
{{ message }}

<button type="button" class="btn-close" data-bs-dismiss="alert"></button>

</div>

{% endfor %}

{% endif %}

<!--  Formulário -->

<form method="POST" class="shadow p-4 rounded bg-white border">

{% csrf_token %}

<div class="mb-3">

<label class="form-label fw-semibold">
Nome Completo
</label>

<input type="text"
name="nome"
class="form-control form-control-lg"
placeholder="Ex: Ivo Avelino"
required>

</div>

<div class="mb-3">

<label class="form-label fw-semibold">
Username
</label>

<input type="text"
name="username"
class="form-control form-control-lg"
placeholder="Ex: maria.silva"
required>

</div>

<div class="mb-3">

<label class="form-label fw-semibold">
Senha
</label>

<input type="password"
name="senha"
class="form-control form-control-lg"
placeholder="Senha segura"
required>

</div>

<!--  NOVO SELECT DE FUNÇÃO -->

<div class="mb-3">

<label class="form-label fw-semibold">
Função
</label>

<select name="role" class="form-select form-select-lg" required>

<option value="">
Selecionar função
</option>

<option value="SECRETARIA">
Secretaria
</option>

<option value="FINANCEIRO">
Financeiro
</option>

</select>

</div>

<button type="submit" class="btn btn-primary w-100 btn-lg">

<i class="bi bi-person-plus-fill"></i>
Criar Conta

</button>

</form>

</div>

{% endblock %}
