<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Painel Financeiro | EdusCel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<!-- Bootstrap 5 -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">


<!-- Bootstrap Icons -->
<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">


<!-- Inter Font -->
<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">



<style>


:root{

    --primary:#2563eb;

    --primary-dark:#1e40af;

    --dark:#0f172a;

    --dark-soft:#1e293b;

    --background:#f8fafc;

    --border:#e2e8f0;

    --text:#334155;

}



*{

    box-sizing:border-box;

}



body{

    margin:0;

    font-family:'Inter',sans-serif;

    background:var(--background);

    color:var(--text);

}



/* ===============================
   SIDEBAR
================================ */


.sidebar{

    width:270px;

    height:100vh;

    position:fixed;

    left:0;

    top:0;

    background:

    linear-gradient(
        180deg,
        #0f172a,
        #1e293b
    );

    padding:28px 18px;

    z-index:1000;

    box-shadow:
    10px 0 30px rgba(0,0,0,.08);

    transition:.3s ease;

}



.logo{

    color:white;

    font-size:24px;

    font-weight:800;

    letter-spacing:.5px;

    padding:0 10px;

    margin-bottom:35px;

}



.logo span{

    color:#60a5fa;

}



.menu{

    list-style:none;

    padding:0;

    margin:0;

}



.menu li{

    margin-bottom:8px;

}



.menu a{

    display:flex;

    align-items:center;

    gap:13px;

    padding:13px 15px;

    color:#cbd5e1;

    text-decoration:none;

    border-radius:14px;

    font-size:15px;

    font-weight:500;

    transition:.25s;

}



.menu a i{

    font-size:19px;

}



.menu a:hover{

    background:rgba(255,255,255,.08);

    color:white;

    transform:translateX(5px);

}



.menu a.active{

    background:

    linear-gradient(
        90deg,
        #2563eb,
        #3b82f6
    );

    color:white;

    box-shadow:

    0 8px 20px rgba(37,99,235,.35);

}



.menu .logout{

    margin-top:35px;

}



.menu .logout a{

    color:#fca5a5;

}


.menu .logout a:hover{

    background:rgba(239,68,68,.15);

}



/* ===============================
   MAIN
================================ */


.main{

    margin-left:270px;

    min-height:100vh;

    padding:30px 40px;

}



/* ===============================
   TOPBAR
================================ */


.topbar{

    background:

    linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    border-radius:18px;

    padding:22px 28px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    color:white;

    margin-bottom:30px;

    box-shadow:

    0 10px 30px rgba(15,23,42,.15);

}



.topbar h4{

    font-size:22px;

}



.topbar small{

    color:#cbd5e1!important;

}



.profile-badge{

    display:flex;

    align-items:center;

    gap:14px;

}



.avatar{

    width:48px;

    height:48px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:

    linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );

    font-weight:800;

    font-size:18px;

    box-shadow:

    0 8px 20px rgba(37,99,235,.35);

}

/* ===============================
   CONTENT AREA
================================ */


.content-area{

    animation:fadeIn .35s ease;

}



@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}



/* ===============================
   DASHBOARD CARDS
================================ */


.dashboard-cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(230px,1fr));

    gap:22px;

    margin-bottom:35px;

}



.finance-card{

    background:white;

    border-radius:20px;

    padding:24px;

    border:1px solid var(--border);

    box-shadow:

    0 10px 25px rgba(15,23,42,.06);

    transition:.3s ease;

}



.finance-card:hover{

    transform:translateY(-5px);

    box-shadow:

    0 18px 35px rgba(15,23,42,.12);

}



.finance-card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:15px;

}



.finance-card-title{

    font-size:14px;

    font-weight:600;

    color:#64748b;

}



.finance-card-value{

    font-size:26px;

    font-weight:800;

    color:#0f172a;

}



.finance-icon{

    width:48px;

    height:48px;

    border-radius:14px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

}



.finance-icon.blue{

    background:#dbeafe;

    color:#2563eb;

}



.finance-icon.green{

    background:#dcfce7;

    color:#16a34a;

}



.finance-icon.red{

    background:#fee2e2;

    color:#dc2626;

}



.finance-icon.yellow{

    background:#fef3c7;

    color:#d97706;

}





/* ===============================
   PASSWORD CARD
================================ */



.card-password-financeiro{

    margin-top:30px;

    padding:24px 28px;

    border-radius:20px;

    background:

    linear-gradient(
        135deg,
        #6d28d9,
        #a855f7
    );

    color:white;

    display:flex;

    align-items:center;

    justify-content:space-between;

    text-decoration:none;

    box-shadow:

    0 15px 35px rgba(109,40,217,.25);

    transition:.3s;

}



.card-password-financeiro:hover{

    transform:translateY(-5px);

    color:white;

}



.password-text{

    display:flex;

    flex-direction:column;

}



.password-text strong{

    font-size:18px;

    font-weight:700;

}



.password-text span{

    font-size:13px;

    opacity:.9;

}



.card-password-financeiro i{

    font-size:32px;

}





/* ===============================
   TABLES
================================ */


.table-finance{

    background:white;

    border-radius:18px;

    overflow:hidden;

    border:1px solid var(--border);

    box-shadow:

    0 10px 25px rgba(15,23,42,.06);

}



.table-finance table{

    margin:0;

}



.table-finance thead{

    background:#0f172a;

    color:white;

}



.table-finance thead th{

    padding:15px;

    font-size:13px;

    font-weight:600;

}



.table-finance tbody td{

    padding:15px;

    vertical-align:middle;

    color:#475569;

}



.table-finance tbody tr{

    transition:.2s;

}



.table-finance tbody tr:hover{

    background:#f8fafc;

}





/* ===============================
   BADGES FINANCEIRO
================================ */


.badge-success{

    background:#dcfce7;

    color:#15803d;

    padding:7px 12px;

    border-radius:20px;

    font-weight:600;

}



.badge-warning{

    background:#fef3c7;

    color:#b45309;

    padding:7px 12px;

    border-radius:20px;

    font-weight:600;

}



.badge-danger{

    background:#fee2e2;

    color:#b91c1c;

    padding:7px 12px;

    border-radius:20px;

    font-weight:600;

}





/* ===============================
   SECTION TITLE
================================ */


.section-title{

    margin-top:35px;

    margin-bottom:20px;

    font-size:20px;

    font-weight:700;

    color:#0f172a;

}





/* ===============================
   CHART
================================ */


.chart-container{

    background:white;

    border-radius:20px;

    padding:25px;

    border:1px solid var(--border);

    box-shadow:

    0 10px 25px rgba(15,23,42,.06);

}





/* ===============================
   FOOTER
================================ */


.footer{

    margin-top:50px;

    padding:20px;

    text-align:center;

    color:#94a3b8;

    font-size:13px;

}

<style>

/* ===============================
   MOBILE
================================ */


.mobile-topbar{

    display:none;

}



.menu-toggle{

    border:none;

    background:transparent;

    font-size:30px;

    color:#0f172a;

    cursor:pointer;

}



@media(max-width:992px){


    body{

        overflow-x:hidden;

    }



    .mobile-topbar{

        display:flex;

        align-items:center;

        height:65px;

        position:fixed;

        top:0;

        left:0;

        right:0;

        background:white;

        padding:0 18px;

        box-shadow:

        0 5px 20px rgba(0,0,0,.08);

        z-index:2000;

    }



    .sidebar{

        left:-280px;

        width:270px;

        z-index:3000;

    }



    .sidebar.show{

        left:0;

    }



    .main{

        margin-left:0;

        padding:

        85px 15px 25px;

    }



    .topbar{

        flex-direction:column;

        align-items:flex-start;

        gap:18px;

        padding:20px;

    }



    .profile-badge{

        width:100%;

    }



}



</style>


</head>


<body>



<!-- MOBILE BUTTON -->

<div class="mobile-topbar">

    <button
        class="menu-toggle"
        onclick="toggleSidebar()">

        <i class="bi bi-list"></i>

    </button>

</div>




<!-- ===============================
     SIDEBAR
================================ -->


<div class="sidebar" id="sidebar">


    <div class="logo">

        Edus<span>Cel</span>

    </div>



    <ul class="menu">


        <li>

            <a href="{% url 'dashboard_financeiro' %}"
            class="{% if request.resolver_match.url_name == 'dashboard_financeiro' %}active{% endif %}">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

        </li>



        <li>

            <a href="{% url 'entradas_financeiro' %}"
            class="{% if request.resolver_match.url_name == 'entradas_financeiro' %}active{% endif %}">

                <i class="bi bi-arrow-down-circle"></i>

                Entradas

            </a>

        </li>




        <li>

            <a href="{% url 'lista_despesas' %}"
            class="{% if request.resolver_match.url_name == 'lista_despesas' %}active{% endif %}">

                <i class="bi bi-wallet2"></i>

                Despesas

            </a>

        </li>



        <li>

            <a href="{% url 'adicionar_despesa' %}"
            class="{% if request.resolver_match.url_name == 'adicionar_despesa' %}active{% endif %}">

                <i class="bi bi-plus-circle"></i>

                Nova Despesa

            </a>

        </li>



        <li class="logout">


            <a href="{% url 'logout' %}">

                <i class="bi bi-box-arrow-right"></i>

                Sair

            </a>


        </li>



    </ul>


</div>





<!-- ===============================
     MAIN
================================ -->


<div class="main">



    <!-- TOPBAR -->


    <div class="topbar">


        <div>


            <h4 class="fw-bold mb-1">

                <i class="bi bi-cash-stack me-2"></i>

                Painel Financeiro

            </h4>



            <small>

                {{ request.user.escola.nome }}

            </small>


        </div>




        <div class="profile-badge">


            <div class="avatar">

                {{ request.user.username|first|upper }}

            </div>



            <div>


                <small>

                    Financeiro

                </small>


                <br>


                <strong>

                    {{ request.user.username }}

                </strong>


            </div>


        </div>



    </div>





    <!-- CONTEÚDO -->

    <div class="content-area">


        {% block content %}

        {% endblock %}


    </div>




    <div class="footer">

        © <span id="anoAtual"></span> EdusCel - Gestão Escolar

    </div>



</div>





<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>





<!-- ===============================
     SESSION TIMEOUT
================================ -->


<script>


let timer;


function resetTimer(){


    clearTimeout(timer);



    timer=setTimeout(()=>{


        window.location.href="{% url 'logout' %}";


    },300000);


}



[
"mousemove",
"keypress",
"click",
"scroll"
]
.forEach(event=>{


    document.addEventListener(
        event,
        resetTimer
    );


});



resetTimer();



</script>





<!-- ===============================
     SIDEBAR MOBILE
================================ -->


<script>


function toggleSidebar(){


    document
    .getElementById("sidebar")
    .classList
    .toggle("show");


}





document.addEventListener(
"click",
function(e){


    const sidebar=
    document.getElementById("sidebar");


    const button=
    document.querySelector(".menu-toggle");



    if(
        window.innerWidth <= 992 &&
        !sidebar.contains(e.target) &&
        !button.contains(e.target)
    ){

        sidebar.classList.remove("show");

    }


});





document.getElementById(
"anoAtual"
).innerHTML =
new Date().getFullYear();



</script>



</body>

</html>
