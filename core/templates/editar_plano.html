{% extends 'admin.html' %}

{% block content %}

<div class="container-fluid py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                 Editar Plano
            </h2>
            <p class="text-muted mb-0">
                Atualize os dados do plano de forma segura
            </p>
        </div>

        <a href="{% url 'gerenciar_planos' %}"
           class="btn btn-outline-secondary rounded-pill px-4">
            ← Voltar
        </a>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <!-- CARD PRINCIPAL -->
            <div class="card border-0 shadow-lg rounded-4 fade-card">

                <div class="card-header bg-gradient bg-primary text-white rounded-top-4 p-3">

                    <div class="d-flex justify-content-between align-items-center">

                        <h5 class="mb-0 fw-bold">
                            {{ plano.nome }}
                        </h5>

                        {% if plano.ativo %}
                            <span class="badge bg-light text-dark">
                                Ativo
                            </span>
                        {% else %}
                            <span class="badge bg-dark">
                                Inativo
                            </span>
                        {% endif %}

                    </div>

                </div>

                <div class="card-body p-4">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row g-4">

                            <!-- NOME -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Nome do Plano
                                </label>
                                <input type="text"
                                       class="form-control form-control-lg shadow-sm"
                                       name="nome"
                                       value="{{ plano.nome }}"
                                       required>
                            </div>

                            <!-- ESCOLA (LOCKED) -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Escola
                                </label>
                                <input type="text"
                                       class="form-control form-control-lg bg-light"
                                       value="{{ plano.escola.nome }}"
                                       readonly>
                            </div>

                            <!-- LIMITES -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">
                                    Limite Alunos
                                </label>
                                <input type="number"
                                       class="form-control form-control-lg shadow-sm"
                                       name="limite_alunos"
                                       value="{{ plano.limite_alunos }}">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">
                                    Limite Professores
                                </label>
                                <input type="number"
                                       class="form-control form-control-lg shadow-sm"
                                       name="limite_professores"
                                       value="{{ plano.limite_professores }}">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">
                                    Limite Turmas
                                </label>
                                <input type="number"
                                       class="form-control form-control-lg shadow-sm"
                                       name="limite_turmas"
                                       value="{{ plano.limite_turmas }}">
                            </div>

                            <!-- VALOR -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Valor Mensal
                                </label>

                                <div class="input-group input-group-lg shadow-sm">

                                    <span class="input-group-text bg-primary text-white">
                                        Kz
                                    </span>

                                    <input type="number"
                                           step="0.01"
                                           class="form-control"
                                           name="valor_mensal"
                                           value="{{ plano.valor_mensal }}">
                                </div>
                            </div>

                            <!-- DATA -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Data de Expiração
                                </label>
                                <input type="date"
                                       class="form-control form-control-lg shadow-sm"
                                       name="data_expiracao"
                                       value="{{ plano.data_expiracao|date:'Y-m-d' }}">
                            </div>

                            <!-- STATUS -->
                            <div class="col-12">

                                <div class="form-check form-switch p-3 bg-light rounded-3">

                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="ativo"
                                           id="ativo"
                                           {% if plano.ativo %}checked{% endif %}>

                                    <label class="form-check-label fw-semibold" for="ativo">
                                        Plano ativo no sistema
                                    </label>

                                </div>

                            </div>

                        </div>

                        <!-- BOTÕES -->
                        <div class="d-flex justify-content-between mt-4">

                            <a href="{% url 'gerenciar_planos' %}"
                               class="btn btn-outline-secondary btn-lg rounded-pill px-4">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">

                                 Salvar Alterações

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- STYLE PREMIUM -->
<style>

.fade-card {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.form-control:focus {
    box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    border-color: #2563eb;
}

</style>

{% endblock %}
