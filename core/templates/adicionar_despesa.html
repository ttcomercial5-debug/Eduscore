{% extends "base_financeiro.html" %}

{% block content %}

<div class="container" style="max-width:500px;">

<h4 class="mb-4">Registrar Despesa</h4>

<form method="POST" class="card p-4 shadow-sm">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Descrição
</label>

<input type="text"
name="descricao"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Valor (Kz)
</label>

<input type="number"
step="0.01"
name="valor"
class="form-control"
required>

</div>

<button type="submit" class="btn btn-danger w-100">

<i class="bi bi-cash"></i>
Registrar Despesa

</button>

</form>

</div>

{% endblock %}
